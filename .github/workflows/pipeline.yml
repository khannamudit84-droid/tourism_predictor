name: Tourism Pipeline (Stable)

on:
  push:
    branches:
      - main

jobs:

  pipeline:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v3


      # 2. Install dependencies (FIXED VERSION)
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt


      # 3. Verify sklearn version (DEBUG)
      - name: Check sklearn version
        run: |
          python -c "import sklearn; print('sklearn version:', sklearn.__version__)"


      # 4. Download dataset
      - name: Download Dataset from HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/download_dataset.py


      # 5. Download model
      - name: Download Model from HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/download_model.py


      # 6. Verify files
      - name: Verify Files
        run: |
          echo "📂 Project structure:"
          ls -R


      # 7. Test model (NO ERROR NOW)
      - name: Run Model Test
        run: |
          python scripts/test_model.py
