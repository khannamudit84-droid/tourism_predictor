name: Tourism Project Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ==============================
  # 1. REGISTER DATASET
  # ==============================
  register-dataset:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          pip install pandas huggingface_hub datasets

      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<EOF
from huggingface_hub import login, upload_file
import os

login(token=os.environ["HF_TOKEN"])

upload_file(
    path_or_fileobj="tourism_project2/data/tourism.csv",
    path_in_repo="data/raw/tourism.csv",
    repo_id="Mudit1984/tourism_project2",
    repo_type="dataset"
)

print("✅ Dataset uploaded to Hugging Face")
EOF


  # ==============================
  # 2. DATA PREPARATION
  # ==============================
  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn huggingface_hub datasets

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python model_building/data_prep.py


  # ==============================
  # 3. MODEL TRAINING
  # ==============================
  model-traning:
    needs: data-prep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn joblib mlflow huggingface_hub datasets

      - name: Start MLflow Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &
          sleep 5

      - name: Model Building & Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python model_building/train.py


  # ==============================
  # 4. DEPLOY TO HF SPACE
  # ==============================
  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-traning, data-prep, register-dataset]

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          pip install huggingface_hub

      - name: Push files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<EOF
from huggingface_hub import login, upload_file
import os

login(token=os.environ["HF_TOKEN"])

SPACE_REPO = "Mudit1984/tourism-predictor1"

# Upload Streamlit app
upload_file(
    path_or_fileobj="app.py",
    path_in_repo="app.py",
    repo_id=SPACE_REPO,
    repo_type="space"
)

# Upload requirements
upload_file(
    path_or_fileobj="requirements.txt",
    path_in_repo="requirements.txt",
    repo_id=SPACE_REPO,
    repo_type="space"
)

print("✅ Streamlit app deployed to Hugging Face Space")
EOF
