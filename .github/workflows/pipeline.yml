name: Tourism Pipeline (Final Stable)

on:
  push:
    branches:
      - main

jobs:

  pipeline:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4


      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      # 3. Install dependencies (LOCKED)
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt


      # 4. Verify sklearn version
      - name: Check sklearn version
        run: |
          python -c "import sklearn; print('sklearn version:', sklearn.__version__)"


      # 5. Download dataset
      - name: Download Dataset
        run: |
          python scripts/download_dataset.py


      # 6. Retrain model (FIXED VERSION)
      - name: Retrain Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/retrain_model.py


      # 7. Download latest model (optional)
      - name: Download Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/download_model.py


      # 8. Verify files
      - name: Verify Files
        run: |
          ls -R


      # 9. Test model (NO ERROR NOW)
      - name: Run Model Test
        run: |
          python scripts/test_model.py
